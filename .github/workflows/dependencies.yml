name: Dependency Management

on:
  schedule:
    # Run weekly on Sundays at 00:00 UTC
    - cron: '0 0 * * 0'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  # ============================================
  # Check for Go module updates
  # ============================================
  check-go-deps:
    name: Check Go Dependencies
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Check for updates
        run: |
          go install github.com/oligot/go-mod-upgrade@latest

          # List outdated dependencies
          go list -u -m all | grep -E "^\S+\s+\S+\s+\S+" || true

      - name: Update dependencies
        run: |
          go get -u ./...
          go mod tidy

      - name: Run tests
        run: go test -short ./...

      - name: Create Pull Request
        if: success()
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore(deps): update Go dependencies"
          title: "chore(deps): weekly dependency update"
          body: |
            ## Automated Dependency Update

            This PR updates Go module dependencies to their latest versions.

            ### Changes
            - Updated all direct dependencies
            - Ran `go mod tidy` to clean up

            ### Verification
            - [ ] Tests pass
            - [ ] No breaking changes introduced
            - [ ] Security scan passes

            ### Security
            Run `govulncheck ./...` locally to verify no new vulnerabilities.
          branch: deps/go-update
          delete-branch: true
          labels: dependencies, automated

  # ============================================
  # Security audit
  # ============================================
  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Run Govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck -show verbose ./... > vuln-report.txt || true

      - name: Upload vulnerability report
        uses: actions/upload-artifact@v4
        with:
          name: vulnerability-report
          path: vuln-report.txt
          retention-days: 30

      - name: Check for critical vulnerabilities
        run: |
          if grep -q "CRITICAL" vuln-report.txt; then
            echo "❌ Critical vulnerabilities found!"
            cat vuln-report.txt
            exit 1
          fi

          if grep -q "HIGH" vuln-report.txt; then
            echo "⚠️ High severity vulnerabilities found"
            cat vuln-report.txt
          fi

          echo "✅ No critical vulnerabilities"

      - name: Create issue for vulnerabilities
        if: failure()
        uses: peter-evans/create-issue-from-file@v5
        with:
          title: "🚨 Security vulnerabilities detected"
          content-filepath: vuln-report.txt
          labels: security, vulnerability, urgent

  # ============================================
  # Docker base image updates
  # ============================================
  check-docker-deps:
    name: Check Docker Base Images
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check for Docker image updates
        run: |
          # Check if Dockerfile uses latest base images
          FROM_IMAGE=$(grep -E "^FROM" deploy/docker/Dockerfile | head -1 | awk '{print $2}')
          echo "Base image: $FROM_IMAGE"

          # Get latest digest
          docker pull $FROM_IMAGE 2>/dev/null || true

          # Check for updates with Trivy
          docker run --rm aquasec/trivy image --severity HIGH,CRITICAL $FROM_IMAGE || true

  # ============================================
  # License compliance check
  # ============================================
  license-check:
    name: License Compliance
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Install go-licenses
        run: go install github.com/google/go-licenses@latest

      - name: Check licenses
        run: |
          go-licenses check ./... --allowed_licenses=MIT,Apache-2.0,BSD-2-Clause,BSD-3-Clause,ISC || true

      - name: Generate license report
        run: |
          go-licenses csv ./... > licenses.csv 2>/dev/null || true
          cat licenses.csv

      - name: Upload license report
        uses: actions/upload-artifact@v4
        with:
          name: license-report
          path: licenses.csv
          retention-days: 30
