name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., v1.0.0)'
        required: true
        type: string

env:
  GO_VERSION: '1.22'

permissions:
  contents: write
  packages: write

jobs:
  build:
    name: Build Release Binaries
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - {os: linux, arch: amd64}
          - {os: linux, arch: arm64}
          - {os: darwin, arch: amd64}
          - {os: darwin, arch: arm64}
          - {os: windows, arch: amd64}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Build
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: 0
        run: |
          VERSION="${{ github.ref_name }}"
          [ "$VERSION" = "" ] && VERSION="${{ github.event.inputs.version }}"

          EXT=""
          [ "${{ matrix.os }}" = "windows" ] && EXT=".exe"

          go build -ldflags "-s -w -X main.version=$VERSION" -o "openep-${{ matrix.os }}-${{ matrix.arch }}${EXT}" ./cmd/openep

          if [ "${{ matrix.os }}" = "windows" ]; then
            zip "openep-${VERSION}-${{ matrix.os }}-${{ matrix.arch }}.zip" "openep-${{ matrix.os }}-${{ matrix.arch }}${EXT}"
          else
            tar -czf "openep-${VERSION}-${{ matrix.os }}-${{ matrix.arch }}.tar.gz" "openep-${{ matrix.os }}-${{ matrix.arch }}${EXT}"
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.os }}-${{ matrix.arch }}
          path: openep-*.*

  docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: .
          file: ./deploy/docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ github.ref_name || github.event.inputs.version }}
            ghcr.io/${{ github.repository }}:latest

  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [build, docker]
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: Create checksums
        run: |
          cd artifacts
          sha256sum * > ../checksums.txt
      - uses: softprops/action-gh-release@v1
        with:
          generate_release_notes: true
          files: |
            artifacts/*
            checksums.txt
