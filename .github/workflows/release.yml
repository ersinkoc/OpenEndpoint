name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build
        run: |
          VERSION=${GITHUB_REF#refs/tags/}

          # Build from root directory using relative path
          # Linux AMD64
          GOOS=linux GOARCH=amd64 CGO_ENABLED=0 go build -ldflags "-s -w -X main.version=$VERSION" -o openep-linux-amd64 ./cmd/openep
          tar -czf openep-${VERSION}-linux-amd64.tar.gz openep-linux-amd64

          # Linux ARM64
          GOOS=linux GOARCH=arm64 CGO_ENABLED=0 go build -ldflags "-s -w -X main.version=$VERSION" -o openep-linux-arm64 ./cmd/openep
          tar -czf openep-${VERSION}-linux-arm64.tar.gz openep-linux-arm64

          # Darwin AMD64
          GOOS=darwin GOARCH=amd64 CGO_ENABLED=0 go build -ldflags "-s -w -X main.version=$VERSION" -o openep-darwin-amd64 ./cmd/openep
          tar -czf openep-${VERSION}-darwin-amd64.tar.gz openep-darwin-amd64

          # Darwin ARM64
          GOOS=darwin GOARCH=arm64 CGO_ENABLED=0 go build -ldflags "-s -w -X main.version=$VERSION" -o openep-darwin-arm64 ./cmd/openep
          tar -czf openep-${VERSION}-darwin-arm64.tar.gz openep-darwin-arm64

          # Windows AMD64
          GOOS=windows GOARCH=amd64 CGO_ENABLED=0 go build -ldflags "-s -w -X main.version=$VERSION" -o openep-windows-amd64.exe ./cmd/openep
          zip openep-${VERSION}-windows-amd64.zip openep-windows-amd64.exe

      - name: Docker Login
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker Build
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          REPO=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          docker build -t ghcr.io/$REPO:$VERSION -t ghcr.io/$REPO:latest -f deploy/docker/Dockerfile .
          docker push ghcr.io/$REPO:$VERSION
          docker push ghcr.io/$REPO:latest

      - name: Release
        uses: softprops/action-gh-release@v1
        with:
          generate_release_notes: true
          files: |
            *.tar.gz
            *.zip
