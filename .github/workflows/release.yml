name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - name: Build binaries
        run: |
          VERSION="${{ github.ref_name }}"
          for os in linux darwin windows; do
            for arch in amd64 arm64; do
              [ "$os" = "windows" ] && EXT=".exe" || EXT=""
              [ "$os" = "windows" ] && [ "$arch" = "arm64" ] && continue
              GOOS=$os GOARCH=$arch CGO_ENABLED=0 go build -ldflags "-s -w -X main.version=$VERSION" -o "openep-$os-$arch$EXT" ./cmd/openep
            done
          done
          ls -la
      - name: Create archives
        run: |
          for f in openep-linux-* openep-darwin-*; do
            tar -czf "$f.tar.gz" "$f"
          done
          for f in openep-windows-*; do
            [ -f "$f" ] && zip "$f.zip" "$f"
          done
      - name: Docker Login
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Docker Build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./deploy/docker/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository }}:${{ github.ref_name }},ghcr.io/${{ github.repository }}:latest
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          generate_release_notes: true
          files: |
            *.tar.gz
            *.zip
