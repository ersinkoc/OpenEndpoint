name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build Linux AMD64
        run: GOOS=linux GOARCH=amd64 CGO_ENABLED=0 go build -ldflags "-s -w" -o openep-linux-amd64 .
        working-directory: cmd/openep

      - name: Build Linux ARM64
        run: GOOS=linux GOARCH=arm64 CGO_ENABLED=0 go build -ldflags "-s -w" -o openep-linux-arm64 .
        working-directory: cmd/openep

      - name: Build Darwin AMD64
        run: GOOS=darwin GOARCH=amd64 CGO_ENABLED=0 go build -ldflags "-s -w" -o openep-darwin-amd64 .
        working-directory: cmd/openep

      - name: Build Darwin ARM64
        run: GOOS=darwin GOARCH=arm64 CGO_ENABLED=0 go build -ldflags "-s -w" -o openep-darwin-arm64 .
        working-directory: cmd/openep

      - name: Build Windows AMD64
        run: GOOS=windows GOARCH=amd64 CGO_ENABLED=0 go build -ldflags "-s -w" -o openep-windows-amd64.exe .
        working-directory: cmd/openep

      - name: Move Binaries
        run: |
          mv cmd/openep/openep-linux-amd64 .
          mv cmd/openep/openep-linux-arm64 .
          mv cmd/openep/openep-darwin-amd64 .
          mv cmd/openep/openep-darwin-arm64 .
          mv cmd/openep/openep-windows-amd64.exe .

      - name: Create Archives
        run: |
          tar -czf openep-linux-amd64.tar.gz openep-linux-amd64
          tar -czf openep-linux-arm64.tar.gz openep-linux-arm64
          tar -czf openep-darwin-amd64.tar.gz openep-darwin-amd64
          tar -czf openep-darwin-arm64.tar.gz openep-darwin-arm64
          zip openep-windows-amd64.zip openep-windows-amd64.exe

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Docker
        run: |
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            --tag ghcr.io/openendpoint/openendpoint:${{ github.ref_name }} \
            --tag ghcr.io/openendpoint/openendpoint:latest \
            --push \
            -f deploy/docker/Dockerfile .

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          generate_release_notes: true
          files: |
            *.tar.gz
            *.zip
