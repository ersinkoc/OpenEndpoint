name: Code Quality

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    # Run nightly at 02:00 UTC
    - cron: '0 2 * * *'

permissions:
  contents: read
  security-events: write

jobs:
  # ============================================
  # Code coverage tracking
  # ============================================
  coverage:
    name: Coverage Analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Run tests with coverage
        run: |
          go test -race -coverprofile=coverage.out -covermode=atomic ./...
          go tool cover -func=coverage.out > coverage.txt

      - name: Generate HTML report
        run: go tool cover -html=coverage.out -o coverage.html

      - name: Extract coverage percentage
        id: coverage
        run: |
          COVERAGE=$(go tool cover -func=coverage.out | grep total | awk '{print $3}' | sed 's/%//')
          echo "coverage=$COVERAGE" >> $GITHUB_OUTPUT
          echo "Total coverage: $COVERAGE%"

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            coverage.out
            coverage.html
          retention-days: 30

      - name: Comment PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const coverage = '${{ steps.coverage.outputs.coverage }}';
            const threshold = 80;
            const status = parseFloat(coverage) >= threshold ? '✅' : '⚠️';

            const body = `## ${status} Code Coverage Report

            | Metric | Value |
            |--------|-------|
            | Total Coverage | **${coverage}%** |
            | Threshold | ${threshold}% |

            <details>
            <summary>View Details</summary>

            Coverage report uploaded as artifact.
            </details>
            `;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

      - name: Check coverage threshold
        run: |
          COVERAGE=${{ steps.coverage.outputs.coverage }}
          THRESHOLD=80

          if (( $(echo "$COVERAGE < $THRESHOLD" | bc -l) )); then
            echo "⚠️ Coverage ($COVERAGE%) is below threshold ($THRESHOLD%)"
            exit 0  # Don't fail, just warn
          fi

          echo "✅ Coverage ($COVERAGE%) meets threshold ($THRESHOLD%)"

  # ============================================
  # Static analysis
  # ============================================
  static-analysis:
    name: Static Analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Run go vet
        run: go vet ./...

      - name: Run staticcheck
        uses: dominikh/staticcheck-action@v1
        with:
          version: "2023.1.7"
          install-go: false

      - name: Run ineffassign
        run: |
          go install github.com/gordonklaus/ineffassign@latest
          ineffassign ./...

      - name: Run misspell
        run: |
          go install github.com/client9/misspell/cmd/misspell@latest
          misspell -error ./...

  # ============================================
  # Code complexity analysis
  # ============================================
  complexity:
    name: Complexity Analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Install gocyclo
        run: go install github.com/fzipp/gocyclo/cmd/gocyclo@latest

      - name: Check cyclomatic complexity
        run: |
          echo "## Cyclomatic Complexity Report" > complexity_report.md
          echo "" >> complexity_report.md

          # Check functions with complexity > 15
          gocyclo -over 15 -top 20 . >> complexity_report.md || true

          cat complexity_report.md

      - name: Fail on high complexity
        run: |
          # Fail if any function has complexity > 20
          if gocyclo -over 20 . 2>/dev/null | grep -q .; then
            echo "❌ Functions with cyclomatic complexity > 20 found:"
            gocyclo -over 20 .
            exit 1
          fi

          echo "✅ Complexity check passed"

      - name: Upload complexity report
        uses: actions/upload-artifact@v4
        with:
          name: complexity-report
          path: complexity_report.md
          retention-days: 30

  # ============================================
  # Dead code detection
  # ============================================
  deadcode:
    name: Dead Code Detection
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Install tools
        run: |
          go install golang.org/x/tools/cmd/deadcode@latest
          go install github.com/remyoudompheng/go-misc/deadcode@latest

      - name: Run deadcode analysis
        run: |
          echo "Checking for unused code..."
          deadcode -test ./... 2>&1 | tee deadcode_report.txt || true

      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: deadcode-report
          path: deadcode_report.txt
          retention-days: 30

  # ============================================
  # Race condition detection
  # ============================================
  race-detector:
    name: Race Condition Detection
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Run tests with race detector
        run: go test -race -count=3 -timeout 30m ./...

  # ============================================
  # Performance benchmarks
  # ============================================
  benchmarks:
    name: Performance Benchmarks
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || contains(github.event.head_commit.message, 'benchmark')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Run benchmarks
        run: go test -bench=. -benchmem -benchtime=10s ./... 2>&1 | tee benchmark.txt

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: benchmark.txt
          retention-days: 90

      - name: Compare with previous
        if: github.ref == 'refs/heads/main'
        uses: benchmark-action/github-action-benchmark@v1
        with:
          tool: 'go'
          output-file-path: benchmark.txt
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: true
          alert-threshold: '150%'
          comment-on-alert: true
          fail-on-alert: false

  # ============================================
  # Summary
  # ============================================
  quality-summary:
    name: Quality Summary
    runs-on: ubuntu-latest
    needs: [coverage, static-analysis, complexity, deadcode, race-detector]
    if: always()
    steps:
      - name: Generate Summary
        run: |
          echo "## 📊 Code Quality Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Coverage Analysis | ${{ needs.coverage.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Static Analysis | ${{ needs.static-analysis.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Complexity Analysis | ${{ needs.complexity.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Dead Code Detection | ${{ needs.deadcode.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Race Detection | ${{ needs.race-detector.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ "${{ needs.coverage.result }}" == "success" ] && \
             [ "${{ needs.static-analysis.result }}" == "success" ] && \
             [ "${{ needs.complexity.result }}" == "success" ] && \
             [ "${{ needs.race-detector.result }}" == "success" ]; then
            echo "✅ All quality checks passed" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ Some quality checks failed" >> $GITHUB_STEP_SUMMARY
          fi
