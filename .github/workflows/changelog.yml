name: Changelog Automation

on:
  push:
    branches: [main]
  pull_request:
    types: [closed]
    branches: [main]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to prepare (e.g., v1.0.0)'
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  # ============================================
  # Update CHANGELOG.md on PR merge
  # ============================================
  update-changelog:
    name: Update Changelog
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.event.pull_request.merged == true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

      - name: Generate changelog entry
        id: generate
        run: |
          PR_NUMBER="${{ github.event.pull_request.number }}"
          PR_TITLE="${{ github.event.pull_request.title }}"
          PR_AUTHOR="${{ github.event.pull_request.user.login }}"
          PR_URL="${{ github.event.pull_request.html_url }}"

          # Determine change type from PR labels or title
          if echo "$PR_TITLE" | grep -qiE "^feat|^feature|^add"; then
            TYPE="Added"
            ICON="✨"
          elif echo "$PR_TITLE" | grep -qiE "^fix|^bugfix|^hotfix"; then
            TYPE="Fixed"
            ICON="🐛"
          elif echo "$PR_TITLE" | grep -qiE "^docs|^doc"; then
            TYPE="Documentation"
            ICON="📚"
          elif echo "$PR_TITLE" | grep -qiE "^perf|^performance|^optimize"; then
            TYPE="Performance"
            ICON="⚡"
          elif echo "$PR_TITLE" | grep -qiE "^refactor|^cleanup"; then
            TYPE="Changed"
            ICON="🔧"
          elif echo "$PR_TITLE" | grep -qiE "^test|^tests"; then
            TYPE="Tests"
            ICON="🧪"
          elif echo "$PR_TITLE" | grep -qiE "^dep|^security|^vuln"; then
            TYPE="Security"
            ICON="🔒"
          else
            TYPE="Changed"
            ICON="📝"
          fi

          # Create changelog entry
          ENTRY="- $ICON $PR_TITLE ([#$PR_NUMBER]($PR_URL)) by @$PR_AUTHOR"

          echo "entry=$ENTRY" >> $GITHUB_OUTPUT
          echo "type=$TYPE" >> $GITHUB_OUTPUT
          echo "Generated entry: $ENTRY"

      - name: Update CHANGELOG.md
        run: |
          ENTRY="${{ steps.generate.outputs.entry }}"
          TYPE="${{ steps.generate.outputs.type }}"
          DATE=$(date +%Y-%m-%d)

          # Check if Unreleased section exists
          if ! grep -q "## \[Unreleased\]" CHANGELOG.md; then
            # Add Unreleased section after header
            sed -i '/^# Changelog$/a\
\
## [Unreleased]\
\
### Added\
\
### Changed\
\
### Fixed\
\
### Security\
\
### Documentation\
' CHANGELOG.md
          fi

          # Add entry under appropriate section
          case "$TYPE" in
            Added)
              sed -i "/### Added/a\\$ENTRY" CHANGELOG.md
              ;;
            Fixed)
              sed -i "/### Fixed/a\\$ENTRY" CHANGELOG.md
              ;;
            Security)
              sed -i "/### Security/a\\$ENTRY" CHANGELOG.md
              ;;
            Documentation)
              sed -i "/### Documentation/a\\$ENTRY" CHANGELOG.md
              ;;
            Performance|Tests)
              sed -i "/### Changed/a\\$ENTRY" CHANGELOG.md
              ;;
            *)
              sed -i "/### Changed/a\\$ENTRY" CHANGELOG.md
              ;;
          esac

          # Remove empty sections
          sed -i '/^### Added$/{N;/^### Added\n\n###/d}' CHANGELOG.md
          sed -i '/^### Changed$/{N;/^### Changed\n\n###/d}' CHANGELOG.md
          sed -i '/^### Fixed$/{N;/^### Fixed\n\n###/d}' CHANGELOG.md
          sed -i '/^### Security$/{N;/^### Security\n\n###/d}' CHANGELOG.md
          sed -i '/^### Documentation$/{N;/^### Documentation\n\n###/d}' CHANGELOG.md

      - name: Commit changes
        run: |
          git add CHANGELOG.md
          git commit -m "docs: update changelog for PR #${{ github.event.pull_request.number }}" || echo "No changes to commit"
          git push || echo "Nothing to push"

  # ============================================
  # Prepare Release Notes
  # ============================================
  prepare-release:
    name: Prepare Release Notes
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

      - name: Determine version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            # Auto-increment patch version
            LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
            LATEST_VERSION=${LATEST_TAG#v}
            MAJOR=$(echo $LATEST_VERSION | cut -d. -f1)
            MINOR=$(echo $LATEST_VERSION | cut -d. -f2)
            PATCH=$(echo $LATEST_VERSION | cut -d. -f3)
            PATCH=$((PATCH + 1))
            VERSION="v$MAJOR.$MINOR.$PATCH"
          fi

          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Next version: $VERSION"

      - name: Extract unreleased changes
        id: extract
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          DATE=$(date +%Y-%m-%d)

          # Extract Unreleased section
          if grep -q "## \[Unreleased\]" CHANGELOG.md; then
            # Get content between Unreleased and next version
            UNRELEASED=$(sed -n '/## \[Unreleased\]/,/## \[/{/## \[Unreleased\]/!{/## \[/!p}}' CHANGELOG.md)

            if [ -n "$UNRELEASED" ]; then
              echo "Found unreleased changes"
              echo "$UNRELEASED" > unreleased_content.txt
            else
              echo "No unreleased changes found"
              exit 1
            fi
          else
            echo "No Unreleased section found"
            exit 1
          fi

      - name: Update CHANGELOG.md with new version
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          VERSION_NUM=${VERSION#v}
          DATE=$(date +%Y-%m-%d)

          # Create new version section
          NEW_SECTION="## [$VERSION_NUM] - $DATE

$(cat unreleased_content.txt)"

          # Replace Unreleased section
          sed -i "/## \[Unreleased\]/,/^## \[/{
            /## \[Unreleased\]/!{
              /^## \[/!d
            }
            /## \[Unreleased\]/a\\
\\
$NEW_SECTION
          }" CHANGELOG.md

          # Update comparison links at the bottom
          if grep -q "\[Unreleased\]:" CHANGELOG.md; then
            # Update existing links
            sed -i "s|\[Unreleased\]:.*|[Unreleased]: https://github.com/${{ github.repository }}/compare/$VERSION...HEAD|" CHANGELOG.md
          else
            # Add new links
            echo "" >> CHANGELOG.md
            echo "[Unreleased]: https://github.com/${{ github.repository }}/compare/$VERSION...HEAD" >> CHANGELOG.md
            echo "[$VERSION_NUM]: https://github.com/${{ github.repository }}/releases/tag/$VERSION" >> CHANGELOG.md
          fi

          # Clean up empty sections in Unreleased
          sed -i '/^### Added$/{N;/^### Added\n\n##/d}' CHANGELOG.md
          sed -i '/^### Changed$/{N;/^### Changed\n\n##/d}' CHANGELOG.md
          sed -i '/^### Fixed$/{N;/^### Fixed\n\n##/d}' CHANGELOG.md
          sed -i '/^### Security$/{N;/^### Security\n\n##/d}' CHANGELOG.md
          sed -i '/^### Documentation$/{N;/^### Documentation\n\n##/d}' CHANGELOG.md

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore(release): prepare ${{ steps.version.outputs.version }}"
          title: "chore(release): prepare ${{ steps.version.outputs.version }}"
          body: |
            ## Release Preparation

            This PR prepares the release ${{ steps.version.outputs.version }}.

            ### Changes
            - Updated CHANGELOG.md with new version
            - Moved unreleased changes to version section

            ### After Merge
            1. Tag the release: `git tag ${{ steps.version.outputs.version }}`
            2. Push the tag: `git push origin ${{ steps.version.outputs.version }}`
            3. The release workflow will automatically create the release

            ### Checklist
            - [ ] Review changelog entries
            - [ ] Verify version number
            - [ ] Merge this PR
            - [ ] Create and push tag
          branch: release/${{ steps.version.outputs.version }}
          delete-branch: true

  # ============================================
  # Validate Changelog
  # ============================================
  validate:
    name: Validate Changelog
    runs-on: ubuntu-latest
    if: github.event_name == 'push'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check CHANGELOG.md format
        run: |
          ERRORS=0

          # Check if file exists
          if [ ! -f CHANGELOG.md ]; then
            echo "❌ CHANGELOG.md not found"
            exit 1
          fi

          # Check header
          if ! grep -q "^# Changelog" CHANGELOG.md; then
            echo "❌ Missing '# Changelog' header"
            ERRORS=$((ERRORS + 1))
          fi

          # Check for Unreleased section
          if ! grep -q "## \[Unreleased\]" CHANGELOG.md; then
            echo "⚠️ Missing '[Unreleased]' section"
          fi

          # Check for common formatting issues
          if grep -n "^##" CHANGELOG.md | grep -v "^## \[" | grep -v "^## Unreleased"; then
            echo "⚠️ Version headers should use format: ## [X.Y.Z]"
          fi

          # Check for trailing whitespace
          if grep -n "[[:space:]]$" CHANGELOG.md; then
            echo "⚠️ Found trailing whitespace"
          fi

          if [ $ERRORS -eq 0 ]; then
            echo "✅ Changelog validation passed"
          else
            echo "❌ Found $ERRORS error(s)"
            exit 1
          fi

      - name: Check for unreleased changes
        run: |
          if grep -q "## \[Unreleased\]" CHANGELOG.md; then
            # Check if Unreleased section has content
            UNRELEASED=$(sed -n '/## \[Unreleased\]/,/## \[/{/## \[Unreleased\]/!{/## \[/!p}}' CHANGELOG.md)
            if [ -n "$UNRELEASED" ] && [ "$(echo "$UNRELEASED" | wc -l)" -gt 2 ]; then
              echo "✅ Found unreleased changes"
              echo "$UNRELEASED"
            else
              echo "ℹ️ No unreleased changes pending"
            fi
          fi
